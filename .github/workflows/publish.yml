name: Publish package

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22.23.1
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test:consumer
      - run: npm pack --dry-run
      # The initial 0.1.0 publication is performed manually so npm can create
      # the package record before a Trusted Publisher is attached. Once that
      # version exists, its release tag should still pass cleanly.
      - name: Check whether this version is already published
        id: release
        shell: bash
        run: |
          package_name="$(node -p \"require('./package.json').name\")"
          package_version="$(node -p \"require('./package.json').version\")"

          if npm view "${package_name}@${package_version}" version --registry=https://registry.npmjs.org > /dev/null 2>&1; then
            echo "already-published=true" >> "$GITHUB_OUTPUT"
            echo "${package_name}@${package_version} is already on npm; skipping duplicate publication."
          else
            echo "already-published=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish to npm
        if: steps.release.outputs.already-published != 'true'
        run: npm publish
      - name: Confirm existing initial release
        if: steps.release.outputs.already-published == 'true'
        run: echo "Verified the manually published release."
